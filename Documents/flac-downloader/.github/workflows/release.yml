name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on any tag like v1.0.0, v1.2.3, etc.

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Fetch ffmpeg
        run: |
          New-Item -ItemType Directory -Force ffmpeg
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          Get-ChildItem -Path ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1 | Copy-Item -Destination ffmpeg\ffmpeg.exe
          Remove-Item -Recurse -Force ffmpeg-tmp

      - name: Generate icon
        run: python make_icon.py

      - name: Build exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "Swiss Downloader" `
            --add-data "ui;ui" `
            --add-binary "ffmpeg\ffmpeg.exe;ffmpeg" `
            --collect-all pywebview `
            --icon icon.ico `
            app.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Swiss Downloader.exe
          # The release body becomes the changelog shown in-app.
          # Edit it on the GitHub Releases page after the tag is pushed.
